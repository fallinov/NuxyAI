name: Deploy to GitHub Pages

on:
  # Déclenche le workflow sur push vers la branche main
  push:
    branches:
      - main

  # Permet de déclencher manuellement le workflow depuis l'onglet Actions
  workflow_dispatch:

# Définit les permissions nécessaires pour déployer sur GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Limite l'exécution à un seul déploiement à la fois
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job de build : génère le site statique
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configuration de GitHub Pages
        uses: actions/configure-pages@v4

      - name: Installation des dépendances
        run: npm ci

      - name: Génération du site statique
        env:
          NODE_ENV: production
          GITHUB_PAGES: true
        run: npm run generate

      - name: Upload de l'artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  # Job de déploiement : publie sur GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Déploiement sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
