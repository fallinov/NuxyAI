<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 420" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="580" height="420" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Header -->
  <text x="30" y="40" font-size="20" font-weight="bold" fill="#1e293b">🛍️ Gestion de produits</text>

  <!-- Highlight zone: search field -->
  <rect x="16" y="52" width="268" height="48" rx="10" fill="none" stroke="#60B155" stroke-width="3" stroke-dasharray="8,4"/>

  <!-- Badge -->
  <rect x="140" y="42" width="150" height="24" rx="12" fill="#60B155"/>
  <text x="158" y="59" font-size="11" font-weight="bold" fill="#ffffff">✏️ À compléter</text>

  <!-- Toolbar: Search with typed text -->
  <rect x="20" y="58" width="260" height="36" rx="8" fill="#ffffff" stroke="#60B155" stroke-width="2"/>
  <text x="32" y="81" font-size="13" fill="#1e293b">🔍 mascara</text>

  <rect x="290" y="58" width="140" height="36" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="302" y="81" font-size="13" fill="#6b7280">Catégorie ▾</text>
  <rect x="440" y="58" width="120" height="36" rx="8" fill="#60B155"/>
  <text x="452" y="81" font-size="13" font-weight="bold" fill="#ffffff">➕ Ajouter</text>

  <!-- Table Header -->
  <rect x="20" y="114" width="540" height="36" rx="0" fill="#f8fafc"/>
  <line x1="20" y1="150" x2="560" y2="150" stroke="#e2e8f0" stroke-width="1"/>
  <text x="35" y="137" font-size="11" font-weight="600" fill="#64748b">IMAGE</text>
  <text x="110" y="137" font-size="11" font-weight="600" fill="#64748b">TITRE</text>
  <text x="310" y="137" font-size="11" font-weight="600" fill="#64748b">PRIX</text>
  <text x="400" y="137" font-size="11" font-weight="600" fill="#64748b">CATÉGORIE</text>
  <text x="500" y="137" font-size="11" font-weight="600" fill="#64748b">ACTIONS</text>

  <!-- Row 1: matches search (highlighted) -->
  <rect x="20" y="150" width="540" height="70" fill="#f0fdf4"/>
  <rect x="35" y="160" width="50" height="50" rx="6" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>
  <text x="48" y="190" font-size="18" fill="#94a3b8">🖼</text>
  <text x="110" y="182" font-size="14" fill="#1e293b">Essence <tspan font-weight="bold" fill="#60B155">Mascara</tspan></text>
  <text x="110" y="200" font-size="11" fill="#94a3b8">Lash Princess</text>
  <text x="310" y="189" font-size="14" font-weight="600" fill="#1e293b">9.99 $</text>
  <text x="400" y="189" font-size="13" fill="#64748b">beauty</text>
  <rect x="496" y="174" width="28" height="28" rx="6" fill="#33A6A6"/>
  <text x="502" y="194" font-size="13" fill="#ffffff">✏️</text>
  <rect x="528" y="174" width="28" height="28" rx="6" fill="#e74c3c"/>
  <text x="533" y="194" font-size="13" fill="#ffffff">🗑️</text>
  <line x1="20" y1="220" x2="560" y2="220" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Rows 2 & 3: hidden (filtered out) -->
  <rect x="20" y="230" width="540" height="100" rx="0" fill="#f8fafc"/>
  <text x="290" y="275" font-size="14" fill="#94a3b8" text-anchor="middle">Les autres produits sont masqués</text>
  <text x="290" y="298" font-size="12" fill="#cbd5e1" text-anchor="middle">Eyeshadow Palette... Powder Canister...</text>

  <!-- Arrows / explanation -->
  <rect x="20" y="350" width="540" height="56" rx="8" fill="#f0fdf4"/>
  <text x="40" y="372" font-size="12" font-weight="600" fill="#60B155">À implémenter :</text>
  <text x="40" y="392" font-size="12" fill="#4D9352">• filtrerProduits(texte) → .filter() + .toLowerCase() + .includes()</text>
  <text x="40" y="392" font-size="12" fill="#4D9352" dx="0" dy="0"> </text>
</svg>
