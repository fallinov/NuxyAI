<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 420" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="580" height="420" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Header -->
  <text x="30" y="40" font-size="20" font-weight="bold" fill="#1e293b">🛍️ Gestion de produits</text>

  <!-- Toolbar (compact) -->
  <rect x="20" y="58" width="200" height="32" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="32" y="78" font-size="12" fill="#9ca3af">🔍 Rechercher...</text>
  <rect x="228" y="58" width="120" height="32" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="238" y="78" font-size="12" fill="#6b7280">Catégorie ▾</text>
  <rect x="356" y="58" width="100" height="32" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="366" y="78" font-size="12" fill="#6b7280">Trier ▾</text>
  <rect x="464" y="58" width="100" height="32" rx="8" fill="#60B155"/>
  <text x="476" y="78" font-size="12" font-weight="bold" fill="#ffffff">➕ Ajouter</text>

  <!-- Table Header -->
  <rect x="20" y="104" width="540" height="32" rx="0" fill="#f8fafc"/>
  <line x1="20" y1="136" x2="560" y2="136" stroke="#e2e8f0" stroke-width="1"/>
  <text x="35" y="124" font-size="10" font-weight="600" fill="#64748b">IMAGE</text>
  <text x="100" y="124" font-size="10" font-weight="600" fill="#64748b">TITRE</text>
  <text x="290" y="124" font-size="10" font-weight="600" fill="#64748b">PRIX</text>
  <text x="370" y="124" font-size="10" font-weight="600" fill="#64748b">CATÉGORIE</text>
  <text x="480" y="124" font-size="10" font-weight="600" fill="#64748b">ACTIONS</text>

  <!-- Row 1: normal -->
  <rect x="35" y="144" width="42" height="42" rx="6" fill="#e2e8f0"/>
  <text x="46" y="170" font-size="14" fill="#94a3b8">🖼</text>
  <text x="100" y="168" font-size="13" fill="#1e293b">Essence Mascara</text>
  <text x="290" y="168" font-size="13" font-weight="600" fill="#1e293b">9.99 $</text>
  <text x="370" y="168" font-size="12" fill="#64748b">beauty</text>
  <rect x="476" y="154" width="26" height="26" rx="6" fill="#33A6A6"/>
  <text x="481" y="173" font-size="12" fill="#ffffff">✏️</text>
  <rect x="506" y="154" width="26" height="26" rx="6" fill="#e74c3c"/>
  <text x="511" y="173" font-size="12" fill="#ffffff">🗑️</text>
  <line x1="20" y1="196" x2="560" y2="196" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Row 2: BEING EDITED - highlight with yellow background -->
  <rect x="20" y="196" width="540" height="60" fill="#fffde7" stroke="#60B155" stroke-width="2" rx="4"/>

  <!-- Highlight badge: PUT -->
  <rect x="476" y="186" width="82" height="22" rx="4" fill="#33A6A6"/>
  <text x="490" y="202" font-size="10" font-weight="bold" fill="#ffffff">PUT /{id}</text>

  <rect x="35" y="204" width="42" height="42" rx="6" fill="#e2e8f0"/>
  <text x="46" y="230" font-size="14" fill="#94a3b8">🖼</text>
  <text x="100" y="222" font-size="13" fill="#1e293b" text-decoration="line-through">Eyeshadow Palette</text>
  <text x="100" y="240" font-size="13" fill="#33A6A6" font-weight="bold">Nouveau titre ✓</text>
  <text x="290" y="228" font-size="13" font-weight="600" fill="#1e293b">19.99 $</text>
  <text x="370" y="228" font-size="12" fill="#64748b">beauty</text>
  <rect x="476" y="214" width="26" height="26" rx="6" fill="#33A6A6"/>
  <text x="481" y="233" font-size="12" fill="#ffffff">✏️</text>
  <rect x="506" y="214" width="26" height="26" rx="6" fill="#e74c3c"/>
  <text x="511" y="233" font-size="12" fill="#ffffff">🗑️</text>

  <!-- Row 3: BEING DELETED - strikethrough, red overlay -->
  <rect x="20" y="262" width="540" height="60" fill="#fef2f2" stroke="#e74c3c" stroke-width="2" rx="4"/>

  <!-- Highlight badge: DELETE -->
  <rect x="476" y="252" width="82" height="22" rx="4" fill="#e74c3c"/>
  <text x="484" y="268" font-size="10" font-weight="bold" fill="#ffffff">DELETE /{id}</text>

  <rect x="35" y="270" width="42" height="42" rx="6" fill="#e2e8f0" opacity="0.5"/>
  <text x="46" y="296" font-size="14" fill="#94a3b8" opacity="0.5">🖼</text>
  <text x="100" y="296" font-size="13" fill="#e74c3c" text-decoration="line-through">Powder Canister</text>
  <text x="290" y="296" font-size="13" fill="#e74c3c" text-decoration="line-through">14.99 $</text>
  <text x="370" y="296" font-size="12" fill="#e74c3c" text-decoration="line-through">beauty</text>
  <rect x="476" y="280" width="26" height="26" rx="6" fill="#33A6A6" opacity="0.5"/>
  <text x="481" y="299" font-size="12" fill="#ffffff" opacity="0.5">✏️</text>
  <rect x="506" y="280" width="26" height="26" rx="6" fill="#e74c3c"/>
  <text x="511" y="299" font-size="12" fill="#ffffff">🗑️</text>

  <!-- Legend -->
  <rect x="20" y="340" width="540" height="70" rx="8" fill="#f8fafc"/>

  <rect x="40" y="354" width="16" height="16" rx="3" fill="#fffde7" stroke="#60B155" stroke-width="1.5"/>
  <text x="64" y="367" font-size="12" fill="#1e293b">Modification (PUT) — prompt() → nouveau titre → mise à jour locale</text>

  <rect x="40" y="380" width="16" height="16" rx="3" fill="#fef2f2" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="64" y="393" font-size="12" fill="#1e293b">Suppression (DELETE) — confirm() → retrait du tableau local</text>
</svg>
