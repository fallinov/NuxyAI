<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 440" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="580" height="440" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Header -->
  <text x="30" y="40" font-size="20" font-weight="bold" fill="#1e293b">🛍️ Gestion de produits</text>

  <!-- Toolbar -->
  <rect x="20" y="58" width="260" height="36" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="32" y="81" font-size="13" fill="#9ca3af">🔍 Rechercher...</text>
  <rect x="290" y="58" width="140" height="36" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="302" y="81" font-size="13" fill="#6b7280">Catégorie ▾</text>
  <rect x="440" y="58" width="120" height="36" rx="8" fill="#60B155"/>
  <text x="452" y="81" font-size="13" font-weight="bold" fill="#ffffff">➕ Ajouter</text>

  <!-- Highlight zone: form -->
  <rect x="16" y="104" width="548" height="186" rx="10" fill="none" stroke="#60B155" stroke-width="3" stroke-dasharray="8,4"/>

  <!-- Badge -->
  <rect x="410" y="94" width="150" height="24" rx="12" fill="#60B155"/>
  <text x="436" y="111" font-size="11" font-weight="bold" fill="#ffffff">✏️ À compléter</text>

  <!-- Form background -->
  <rect x="20" y="110" width="540" height="176" rx="12" fill="#f0fdf4" stroke="#60B155" stroke-width="2"/>

  <!-- Form title -->
  <text x="40" y="138" font-size="16" font-weight="bold" fill="#1e293b">Nouveau produit</text>

  <!-- Form field: Titre -->
  <text x="40" y="162" font-size="11" font-weight="600" fill="#64748b">TITRE</text>
  <rect x="40" y="168" width="250" height="32" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="52" y="189" font-size="13" fill="#1e293b">Mon super produit</text>

  <!-- Form field: Prix -->
  <text x="310" y="162" font-size="11" font-weight="600" fill="#64748b">PRIX ($)</text>
  <rect x="310" y="168" width="120" height="32" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="322" y="189" font-size="13" fill="#1e293b">29.99</text>

  <!-- Form field: Catégorie -->
  <text x="40" y="218" font-size="11" font-weight="600" fill="#64748b">CATÉGORIE</text>
  <rect x="40" y="224" width="250" height="32" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="52" y="245" font-size="13" fill="#1e293b">electronics</text>

  <!-- Form buttons -->
  <rect x="310" y="224" width="100" height="32" rx="6" fill="#60B155"/>
  <text x="330" y="245" font-size="13" font-weight="bold" fill="#ffffff">Envoyer</text>
  <rect x="420" y="224" width="80" height="32" rx="6" fill="#94a3b8"/>
  <text x="436" y="245" font-size="13" fill="#ffffff">Annuler</text>

  <!-- Arrow POST -->
  <line x1="360" y1="270" x2="360" y2="296" stroke="#60B155" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#60B155"/>
    </marker>
  </defs>

  <!-- POST badge -->
  <rect x="320" y="296" width="82" height="22" rx="4" fill="#60B155"/>
  <text x="334" y="312" font-size="11" font-weight="bold" fill="#ffffff">POST /add</text>

  <!-- Table (dimmed, below form) -->
  <rect x="20" y="330" width="540" height="36" rx="0" fill="#f8fafc"/>
  <text x="35" y="353" font-size="11" font-weight="600" fill="#64748b">IMAGE</text>
  <text x="110" y="353" font-size="11" font-weight="600" fill="#64748b">TITRE</text>
  <text x="310" y="353" font-size="11" font-weight="600" fill="#64748b">PRIX</text>
  <text x="400" y="353" font-size="11" font-weight="600" fill="#64748b">CATÉGORIE</text>
  <text x="500" y="353" font-size="11" font-weight="600" fill="#64748b">ACTIONS</text>
  <line x1="20" y1="366" x2="560" y2="366" stroke="#e2e8f0" stroke-width="1"/>

  <!-- New row (just added, highlighted) -->
  <rect x="20" y="370" width="540" height="40" fill="#f0fdf4"/>
  <text x="35" y="396" font-size="13" fill="#60B155" font-weight="bold">🆕</text>
  <text x="110" y="396" font-size="14" fill="#60B155" font-weight="600">Mon super produit</text>
  <text x="310" y="396" font-size="14" fill="#60B155" font-weight="600">29.99 $</text>
  <text x="400" y="396" font-size="13" fill="#60B155">electronics</text>

  <!-- Explanation -->
  <rect x="20" y="414" width="540" height="20" rx="4" fill="none"/>
  <text x="290" y="430" font-size="11" fill="#94a3b8" text-anchor="middle">Le produit apparaît en haut du tableau après l'envoi</text>
</svg>
