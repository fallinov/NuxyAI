<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 560" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="580" height="560" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Title -->
  <text x="290" y="36" font-size="18" font-weight="bold" fill="#1e293b" text-anchor="middle">Destructuring de tableau</text>

  <!-- Badge -->
  <rect x="440" y="20" width="120" height="28" rx="14" fill="#f0fdf4" stroke="#60B155" stroke-width="1.5"/>
  <text x="500" y="39" font-size="11" font-weight="600" fill="#60B155" text-anchor="middle">ES6+</text>

  <!-- Source array -->
  <text x="40" y="72" font-size="13" font-weight="600" fill="#64748b">Tableau source</text>
  <rect x="40" y="82" width="500" height="50" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="52" y="92" width="85" height="30" rx="6" fill="#60B155" stroke="#4D9352" stroke-width="1"/>
  <text x="94" y="112" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">"rouge"</text>
  <text x="50" y="147" font-size="10" fill="#94a3b8">[0]</text>

  <rect x="147" y="92" width="85" height="30" rx="6" fill="#60B155" stroke="#4D9352" stroke-width="1"/>
  <text x="189" y="112" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">"vert"</text>
  <text x="145" y="147" font-size="10" fill="#94a3b8">[1]</text>

  <rect x="242" y="92" width="85" height="30" rx="6" fill="#60B155" stroke="#4D9352" stroke-width="1"/>
  <text x="284" y="112" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">"bleu"</text>
  <text x="240" y="147" font-size="10" fill="#94a3b8">[2]</text>

  <rect x="337" y="92" width="85" height="30" rx="6" fill="#94a3b8" stroke="#64748b" stroke-width="1"/>
  <text x="379" y="112" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">"jaune"</text>
  <text x="335" y="147" font-size="10" fill="#94a3b8">[3]</text>

  <rect x="432" y="92" width="85" height="30" rx="6" fill="#94a3b8" stroke="#64748b" stroke-width="1"/>
  <text x="474" y="112" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">"violet"</text>
  <text x="430" y="147" font-size="10" fill="#94a3b8">[4]</text>

  <!-- SECTION 1 : Extraction basique -->
  <text x="290" y="170" font-size="11" font-weight="600" fill="#60B155" text-anchor="middle">const [premiere, deuxieme, troisieme] = couleurs</text>

  <rect x="52" y="182" width="145" height="36" rx="8" fill="#60B155" stroke="#4D9352" stroke-width="1.5"/>
  <text x="124" y="205" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">premiere = "rouge"</text>

  <rect x="208" y="182" width="145" height="36" rx="8" fill="#60B155" stroke="#4D9352" stroke-width="1.5"/>
  <text x="280" y="205" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">deuxieme = "vert"</text>

  <rect x="364" y="182" width="150" height="36" rx="8" fill="#60B155" stroke="#4D9352" stroke-width="1.5"/>
  <text x="439" y="205" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">troisieme = "bleu"</text>

  <!-- Separator 1 -->
  <line x1="40" y1="236" x2="540" y2="236" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- SECTION 2 : Ignorer un élément -->
  <text x="40" y="260" font-size="13" font-weight="600" fill="#64748b">Ignorer un élément</text>
  <text x="350" y="260" font-size="11" fill="#D45E95">const [important1, , important2] = couleurs</text>

  <rect x="52" y="272" width="130" height="36" rx="8" fill="#60B155" stroke="#4D9352" stroke-width="1.5"/>
  <text x="117" y="295" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">important1 = "rouge"</text>

  <!-- Skipped element -->
  <rect x="195" y="272" width="100" height="36" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="245" y="290" font-size="11" fill="#ef4444" text-anchor="middle">"vert"</text>
  <text x="245" y="302" font-size="9" fill="#f87171" text-anchor="middle">ignoré ( , )</text>

  <rect x="308" y="272" width="130" height="36" rx="8" fill="#60B155" stroke="#4D9352" stroke-width="1.5"/>
  <text x="373" y="295" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">important2 = "bleu"</text>

  <!-- Separator 2 -->
  <line x1="40" y1="326" x2="540" y2="326" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- SECTION 3 : Rest pattern -->
  <text x="40" y="350" font-size="13" font-weight="600" fill="#64748b">Rest pattern</text>
  <text x="350" y="350" font-size="11" fill="#33A6A6">const [top, ...autres] = couleurs</text>

  <rect x="52" y="362" width="110" height="36" rx="8" fill="#60B155" stroke="#4D9352" stroke-width="1.5"/>
  <text x="107" y="385" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">top = "rouge"</text>

  <rect x="175" y="362" width="350" height="36" rx="8" fill="#33A6A6" stroke="#246B6B" stroke-width="1.5"/>
  <text x="350" y="381" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">...autres = [vert, bleu, jaune, violet]</text>
  <text x="350" y="395" font-size="9" fill="#ccfbf1" text-anchor="middle">nouveau tableau indépendant</text>

  <!-- Separator 3 -->
  <line x1="40" y1="416" x2="540" y2="416" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Summary code comparison -->
  <text x="40" y="440" font-size="13" font-weight="600" fill="#64748b">Avant / Après</text>

  <rect x="40" y="452" width="240" height="50" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="55" y="471" font-size="10" fill="#991b1b" font-weight="600">Avant (3 lignes)</text>
  <text x="55" y="490" font-size="10" fill="#64748b" font-family="monospace">const a = couleurs[0]</text>

  <rect x="300" y="452" width="240" height="50" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="315" y="471" font-size="10" fill="#166534" font-weight="600">Après (1 ligne)</text>
  <text x="315" y="490" font-size="10" fill="#64748b" font-family="monospace">const [a, b, c] = couleurs</text>

  <!-- Footer -->
  <text x="290" y="540" font-size="11" fill="#94a3b8" text-anchor="middle">3 syntaxes : extraire, ignorer, récupérer le reste</text>
</svg>
