<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 440" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="580" height="440" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Title -->
  <text x="290" y="36" font-size="18" font-weight="bold" fill="#1e293b" text-anchor="middle">Chaîner les Promises</text>

  <!-- Pipeline -->
  <text x="40" y="72" font-size="13" font-weight="600" fill="#64748b">Pipeline : chaque étape passe son résultat à la suivante</text>

  <!-- Step 1 -->
  <rect x="30" y="90" width="145" height="70" rx="12" fill="#f0fdf4" stroke="#60B155" stroke-width="2"/>
  <text x="102" y="115" font-size="12" font-weight="bold" fill="#166534" text-anchor="middle">1. Acheter</text>
  <text x="102" y="133" font-size="10" fill="#166534" text-anchor="middle">🛒 "Pasta"</text>
  <text x="102" y="150" font-size="9" fill="#15803d" text-anchor="middle">resolve(ingrédients)</text>

  <!-- Arrow .then() 1 -->
  <line x1="175" y1="125" x2="215" y2="125" stroke="#33A6A6" stroke-width="2.5" marker-end="url(#arrowTeal)"/>
  <text x="195" y="118" font-size="9" font-weight="600" fill="#33A6A6" text-anchor="middle">.then()</text>

  <!-- Step 2 -->
  <rect x="215" y="90" width="145" height="70" rx="12" fill="#e0f2fe" stroke="#33A6A6" stroke-width="2"/>
  <text x="287" y="115" font-size="12" font-weight="bold" fill="#0c4a6e" text-anchor="middle">2. Cuisiner</text>
  <text x="287" y="133" font-size="10" fill="#0c4a6e" text-anchor="middle">🍳 ingrédients</text>
  <text x="287" y="150" font-size="9" fill="#0369a1" text-anchor="middle">resolve(plat)</text>

  <!-- Arrow .then() 2 -->
  <line x1="360" y1="125" x2="400" y2="125" stroke="#33A6A6" stroke-width="2.5" marker-end="url(#arrowTeal)"/>
  <text x="380" y="118" font-size="9" font-weight="600" fill="#33A6A6" text-anchor="middle">.then()</text>

  <!-- Step 3 -->
  <rect x="400" y="90" width="145" height="70" rx="12" fill="#fefce8" stroke="#FFD966" stroke-width="2"/>
  <text x="472" y="115" font-size="12" font-weight="bold" fill="#713f12" text-anchor="middle">3. Servir</text>
  <text x="472" y="133" font-size="10" fill="#713f12" text-anchor="middle">🍽️ plat</text>
  <text x="472" y="150" font-size="9" fill="#a16207" text-anchor="middle">resolve("Bon appétit !")</text>

  <!-- Arrow to result -->
  <line x1="472" y1="160" x2="472" y2="195" stroke="#60B155" stroke-width="2.5" marker-end="url(#arrowGreen2)"/>
  <text x="500" y="180" font-size="9" font-weight="600" fill="#60B155">.then()</text>

  <!-- Final result -->
  <rect x="370" y="195" width="185" height="35" rx="8" fill="#60B155"/>
  <text x="462" y="217" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">console.log("Bon appétit !")</text>

  <!-- Catch bar -->
  <line x1="30" y1="250" x2="545" y2="250" stroke="#fca5a5" stroke-width="1" stroke-dasharray="6 3"/>

  <rect x="200" y="260" width="180" height="40" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="290" y="278" font-size="12" font-weight="bold" fill="#991b1b" text-anchor="middle">.catch(erreur)</text>
  <text x="290" y="294" font-size="10" fill="#991b1b" text-anchor="middle">Attrape TOUTES les erreurs</text>

  <!-- Error arrows pointing to catch -->
  <line x1="102" y1="160" x2="220" y2="268" stroke="#fca5a5" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="287" y1="160" x2="270" y2="260" stroke="#fca5a5" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="472" y1="230" x2="370" y2="268" stroke="#fca5a5" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Separator -->
  <line x1="40" y1="320" x2="540" y2="320" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Rule: return -->
  <text x="40" y="348" font-size="13" font-weight="600" fill="#64748b">Règle d'or</text>

  <!-- Return is important -->
  <rect x="40" y="360" width="240" height="55" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="55" y="382" font-size="11" fill="#991b1b" font-weight="600">❌ Sans return</text>
  <text x="55" y="400" font-size="10" fill="#64748b" font-family="monospace">.then(function(x) { etape(x) })</text>

  <rect x="300" y="360" width="240" height="55" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="315" y="382" font-size="11" fill="#166534" font-weight="600">✅ Avec return</text>
  <text x="315" y="400" font-size="10" fill="#64748b" font-family="monospace">.then(function(x) { return etape(x) })</text>

  <!-- Badge -->
  <rect x="440" y="20" width="120" height="28" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="500" y="39" font-size="11" font-weight="600" fill="#92400e" text-anchor="middle">Asynchrone</text>

  <!-- Footer -->
  <text x="290" y="432" font-size="11" fill="#94a3b8" text-anchor="middle">Chaque .then() reçoit la valeur du précédent</text>

  <!-- Defs -->
  <defs>
    <marker id="arrowTeal" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="#33A6A6"/>
    </marker>
    <marker id="arrowGreen2" markerWidth="8" markerHeight="8" refX="4" refY="7" orient="auto">
      <path d="M0,0 L4,8 L8,0" fill="#60B155"/>
    </marker>
  </defs>
</svg>
