<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 440" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="580" height="440" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Title -->
  <text x="290" y="36" font-size="18" font-weight="bold" fill="#1e293b" text-anchor="middle">Destructuring d'objet &amp; Spread</text>

  <!-- Source object card -->
  <text x="40" y="70" font-size="13" font-weight="600" fill="#64748b">Objet source</text>
  <rect x="40" y="80" width="220" height="110" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="55" y="103" font-size="12" font-weight="600" fill="#1e293b">personnage {</text>
  <text x="70" y="122" font-size="12" fill="#60B155">nom: </text>
  <text x="115" y="122" font-size="12" fill="#1e293b">"Link"</text>
  <text x="70" y="142" font-size="12" fill="#60B155">jeu: </text>
  <text x="110" y="142" font-size="12" fill="#1e293b">"Zelda"</text>
  <text x="70" y="162" font-size="12" fill="#60B155">pv: </text>
  <text x="100" y="162" font-size="12" fill="#1e293b">100</text>
  <text x="55" y="182" font-size="12" font-weight="600" fill="#1e293b">}</text>

  <!-- Arrow: destructuring -->
  <text x="290" y="115" font-size="16" fill="#60B155" text-anchor="middle">→</text>
  <text x="290" y="133" font-size="10" fill="#60B155" text-anchor="middle">{ nom, jeu }</text>

  <!-- Extracted variables -->
  <text x="330" y="70" font-size="13" font-weight="600" fill="#64748b">Variables extraites</text>
  <rect x="330" y="82" width="100" height="34" rx="8" fill="#60B155"/>
  <text x="380" y="104" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">nom = "Link"</text>

  <rect x="440" y="82" width="110" height="34" rx="8" fill="#60B155"/>
  <text x="495" y="104" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">jeu = "Zelda"</text>

  <!-- Separator -->
  <line x1="40" y1="210" x2="540" y2="210" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Spread copy -->
  <text x="40" y="237" font-size="13" font-weight="600" fill="#64748b">Copie avec spread</text>
  <text x="350" y="237" font-size="11" fill="#33A6A6">const copie = { ...personnage }</text>

  <rect x="40" y="248" width="160" height="55" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="55" y="268" font-size="11" fill="#64748b">personnage</text>
  <text x="55" y="288" font-size="11" fill="#1e293b">pv: 100 ✅</text>

  <text x="220" y="278" font-size="14" fill="#33A6A6" text-anchor="middle">≠</text>

  <rect x="240" y="248" width="160" height="55" rx="10" fill="#e0f2fe" stroke="#33A6A6" stroke-width="1.5"/>
  <text x="255" y="268" font-size="11" fill="#33A6A6" font-weight="600">copie (indépendante)</text>
  <text x="255" y="288" font-size="11" fill="#1e293b">pv: 50</text>

  <!-- Separator -->
  <line x1="40" y1="320" x2="540" y2="320" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Fusion -->
  <text x="40" y="347" font-size="13" font-weight="600" fill="#64748b">Fusion d'objets</text>
  <text x="350" y="347" font-size="11" fill="#FFD966">{ ...personnage, ...bonus }</text>

  <rect x="40" y="358" width="120" height="40" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="100" y="374" font-size="10" fill="#64748b" text-anchor="middle">personnage</text>
  <text x="100" y="390" font-size="10" fill="#1e293b" text-anchor="middle">nom, jeu, pv</text>

  <text x="176" y="383" font-size="16" fill="#FFD966" text-anchor="middle">+</text>

  <rect x="195" y="358" width="120" height="40" rx="8" fill="#fff7ed" stroke="#FFD966" stroke-width="1.5"/>
  <text x="255" y="374" font-size="10" fill="#92400e" text-anchor="middle">bonus</text>
  <text x="255" y="390" font-size="10" fill="#1e293b" text-anchor="middle">arme, bouclier</text>

  <text x="332" y="383" font-size="16" fill="#60B155" text-anchor="middle">=</text>

  <rect x="350" y="355" width="195" height="45" rx="8" fill="#f0fdf4" stroke="#60B155" stroke-width="1.5"/>
  <text x="447" y="373" font-size="10" fill="#60B155" font-weight="600" text-anchor="middle">hero (fusionné)</text>
  <text x="447" y="391" font-size="10" fill="#1e293b" text-anchor="middle">nom, jeu, pv, arme, bouclier</text>

  <!-- Badge -->
  <rect x="440" y="20" width="120" height="28" rx="14" fill="#f0fdf4" stroke="#60B155" stroke-width="1.5"/>
  <text x="500" y="39" font-size="11" font-weight="600" fill="#60B155" text-anchor="middle">ES6+</text>

  <!-- Footer -->
  <text x="290" y="428" font-size="11" fill="#94a3b8" text-anchor="middle">Destructuring + Spread : extraire, copier, fusionner</text>
</svg>
